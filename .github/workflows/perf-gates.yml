name: Perf Gates

on:
  pull_request:
    branches:
      - master
      - main
      - develop

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  perf-smoke:
    name: Perf Smoke Gate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore
        run: dotnet restore

      - name: Run Perf Smoke Suite
        run: bash tools/perf/run-perf-smoke.sh

      - name: Publish Perf Summary
        if: always()
        run: |
          if [[ -f artifacts/perf-gates/perf-smoke-summary.md ]]; then
            cat artifacts/perf-gates/perf-smoke-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Perf smoke summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Perf Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-artifacts
          path: |
            artifacts/perf-gates/**
            artifacts/remote-protocol-bench/**
            artifacts/remote-hostload/**
            artifacts/remote-webclient-perf/**
            tests/ProDiagnostics.Remote.WebClient.Perf/playwright-report/**
          if-no-files-found: warn
          retention-days: 14
